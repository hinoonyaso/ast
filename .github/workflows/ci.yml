name: CI - Test & Lint

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'client/**'
      - 'shared/**'
      - '.github/workflows/ci.yml'

jobs:
  server-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: ast_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: Run migrations
        working-directory: ./server
        env:
          DATABASE_URL: mysql://testuser:testpass@localhost:3306/ast_test
        run: npx prisma migrate deploy

      - name: Verify DB Connection (Prisma)
        working-directory: ./server
        env:
          DATABASE_URL: mysql://testuser:testpass@localhost:3306/ast_test
        run: npx prisma migrate status

      - name: Run Unit Tests
        working-directory: ./server
        env:
          DATABASE_URL: mysql://testuser:testpass@localhost:3306/ast_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
        run: npm run test:unit -- --coverage

      - name: Run Integration Tests
        working-directory: ./server
        env:
          DATABASE_URL: mysql://testuser:testpass@localhost:3306/ast_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          OPENAI_API_KEY: sk-test-dummy
        run: npm run test:integration

      - name: Type Check
        working-directory: ./server
        run: npx tsc --noEmit

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./server/coverage
          flags: server

  client-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cocos CLI (if needed)
        run: |
          # Cocos Creator 빌드는 로컬에서 수행, 여기서는 TypeScript 체크만
          cd client/assets/scripts
          npm ci || echo "No package.json in client"

      - name: TypeScript Check (Client)
        working-directory: ./client/assets/scripts
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "Skipping client type check"
          fi
        continue-on-error: true

  validate-pr:
    runs-on: ubuntu-latest
    needs: [server-test, client-build-check]
    steps:
      - name: PR Validation
        run: |
          echo "✅ All tests passed"
          echo "✅ Ready for review"
