name: CD - Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'infrastructure/**'
      - '.github/workflows/cd.yml'

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ast-server
  EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ubuntu

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG=sha-$(git rev-parse --short HEAD)
          echo "tags=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build, tag, and push image
        working-directory: ./server
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tags }}
        run: |
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "Pushed $IMAGE_TAG"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            # 로깅
            echo "[$(date)] Starting deployment: $IMAGE_URI"

            # ECR 로그인
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            # 기존 컨테이너 중지 (무중단 배포를 위한 Blue-Green은 추후 구현)
            docker pull $IMAGE_URI

            # 새 컨테이너 실행
            docker stop ast-server || true
            docker rm ast-server || true

            docker run -d \
              --name ast-server \
              --restart always \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e REDIS_URL="${{ secrets.REDIS_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_REGION="${{ env.AWS_REGION }}" \
              -e S3_BUCKET="${{ secrets.S3_BUCKET }}" \
              $IMAGE_URI

            # Prisma 마이그레이션 (컨테이너 내부에서)
            docker exec ast-server npx prisma migrate deploy

            # 헬스체크
            sleep 10
            curl -f http://localhost:3000/api/health || exit 1

            # 이전 이미지 정리
            docker image prune -af

            echo "[$(date)] Deployment successful"
          EOF

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  migrate-db:
    needs: deploy
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[migrate]')
    steps:
      - name: Run specific migrations
        run: |
          echo "Running database migrations..."
          # 마이그레이션 필요 시 수동 트리거 또는 별도 승인 프로세스 권장
